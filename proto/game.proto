// proto/game.proto

// Purpose: Strict gRPC API contract for Dual-Agent routing and game state (Healthcare Detective Edition)
// Author: Nahasat Nibir (Lead Cloud Architect)
// Date: 2026-03-19
// Dependencies: protoc, protoc-gen-go, protoc-gen-go-grpc

syntax = "proto3";

package vaultsim.v1;

// Defines the Go package path for generated code
option go_package = "vaultsim/gateway/internal/rpc/pb";

// Enum to track the overall state of the simulation
enum GameStatus {
  IN_PROGRESS = 0;
  VICTORY = 1;
  DEFEAT = 2; // Optional: If the user exhausts all turns without winning
}

// DualAgentEngine handles the conversational AI and isolated judging
service DualAgentEngine {
  // Streams the user's chat event to the Python AI service and returns the Persona's response
  // along with any asynchronous clue updates from the Judge agent.
  rpc ProcessChatEvent(ChatRequest) returns (stream ChatResponse);
  
  // Validates a scenario session initialization
  rpc ValidateSession(SessionRequest) returns (SessionResponse);
}

// Represents an incoming message from the user
message ChatRequest {
  string session_id = 1;
  string user_id = 2;
  string message = 3;
  int64 timestamp = 4;
  int32 turn_count = 5;       // Injected by the Go Gateway's Redis state to track the "Pity Timer"
  string scenario_id = 6;     // e.g., "wandering_usb", "fake_doctor", "open_ehr"
}

// Represents the system's response, including the Persona's reply and Judge's evaluation
message ChatResponse {
  string event_id = 1;
  string persona_reply = 2;            // The text generated by the Persona LLM
  GameStatus game_status = 3;          // Replaces secret_revealed (Evaluated by the Judge LLM)
  repeated string clues_uncovered = 4; // Array of discovered clue IDs (Replaces score_delta)
  string judge_explanation = 5;        // Internal reasoning from the Judge LLM
  int32 turn_count = 6;                // Echoed back for UI sync
}

message SessionRequest {
  string session_id = 1;
  string user_id = 2;
  string scenario_id = 3;
}

message SessionResponse {
  bool is_valid = 1;
  string error_message = 2;
  string persona_role = 3;        // e.g., "Hospital Nurse" or "Remote Doctor"
}